<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大鹏诡屏 · DaPengHorror</title>
  <link rel="stylesheet" href="style-horror.css" />
</head>
<body>
  <div id="screen">
    <!-- ===== Header ===== -->
    <header class="header">
      <div class="h-left">
        <div id="date" class="h-date">2026-01-01 血月</div>
        <div id="clock" class="h-clock">00:00:00</div>
      </div>
      <div class="h-center">
        <h1 class="h-title">大鹏诡屏</h1>
        <div class="h-sub">DaPengHorror · Eerie Data View</div>
        <div class="h-line"></div>
      </div>
      <div class="h-right">
        <span class="badge ok">● 阴间在线</span>
        <span class="badge">🌫 雾 13°C</span>
        <span class="badge" id="refreshTime">窥探 00:00:00</span>
      </div>
    </header>

    <!-- ===== Left Column ===== -->
    <section class="col col-left">
      <div class="panel kpi-panel">
        <div class="panel-h"><i class="bar"></i>异常指标</div>
        <div class="panel-b">
          <div class="kpi-grid" id="kpiGrid"></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-h"><i class="bar"></i>灵异波动趋势</div>
        <div class="panel-b"><div id="trendChart" class="chart"></div></div>
      </div>
      <div class="panel">
        <div class="panel-h"><i class="bar"></i>怨灵类别占比</div>
        <div class="panel-b"><div id="categoryChart" class="chart"></div></div>
      </div>
    </section>

    <!-- ===== Center Column ===== -->
    <section class="col col-center">
      <div class="panel map-panel">
        <div class="panel-h"><i class="bar"></i>全国灵异分布</div>
        <div class="panel-b"><div id="mapChart" class="chart"></div></div>
      </div>
      <div class="panel rank-panel">
        <div class="panel-h"><i class="bar"></i>城市灵异榜 TOP10</div>
        <div class="panel-b">
          <div class="rank-scroll"><div class="rank-track" id="rankTrack"></div></div>
        </div>
      </div>
    </section>

    <!-- ===== Right Column ===== -->
    <section class="col col-right">
      <div class="panel">
        <div class="panel-h"><i class="bar"></i>渗透途径</div>
        <div class="panel-b"><div id="channelChart" class="chart"></div></div>
      </div>
      <div class="panel">
        <div class="panel-h"><i class="bar"></i>神志与诅咒</div>
        <div class="panel-b gauge-b">
          <div id="gauge1" class="chart half"></div>
          <div id="gauge2" class="chart half"></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-h"><i class="bar"></i>诡异动态</div>
        <div class="panel-b"><div id="logList" class="log-list"></div></div>
      </div>
    </section>

    <!-- ===== 血迹层：血手印 + 飞溅 ===== -->
    <div class="blood-layer">
      <svg class="blood-splat" viewBox="0 0 1920 1080" preserveAspectRatio="none">
        <defs>
          <radialGradient id="blob" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#b00d22" stop-opacity="0.7" />
            <stop offset="60%" stop-color="#8c0a1a" stop-opacity="0.4" />
            <stop offset="100%" stop-color="#8c0a1a" stop-opacity="0" />
          </radialGradient>
          <filter id="rough" x="-40%" y="-40%" width="180%" height="180%">
            <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="3" seed="9" result="n" />
            <feDisplacementMap in="SourceGraphic" in2="n" scale="42" xChannelSelector="R" yChannelSelector="G" />
          </filter>
          <filter id="drop" x="-60%" y="-60%" width="220%" height="220%">
            <feTurbulence type="fractalNoise" baseFrequency="0.22" numOctaves="2" seed="4" result="n" />
            <feDisplacementMap in="SourceGraphic" in2="n" scale="7" />
          </filter>
          <path id="stain" d="M-26,-8 C-22,-26 6,-34 26,-22 C42,-13 40,12 28,26 C14,42 -14,40 -28,26 C-40,14 -34,-2 -26,-8 Z" />
        </defs>

        <!-- 大血泊：有机不规则边缘 -->
        <g filter="url(#rough)" opacity="0.8">
          <use href="#stain" transform="translate(80,98) scale(1.7)" fill="#a30b1c" />
          <use href="#stain" transform="translate(1858,118) scale(1.9)" fill="#a30b1c" />
          <use href="#stain" transform="translate(1886,906) scale(1.75)" fill="#a30b1c" />
          <use href="#stain" transform="translate(92,1004) scale(1.6)" fill="#a30b1c" />
          <use href="#stain" transform="translate(1504,568) scale(1.5)" fill="#b00d22" />
          <use href="#stain" transform="translate(1568,772) scale(1.0)" fill="#a30b1c" />
          <use href="#stain" transform="translate(470,860) scale(0.9)" fill="#a30b1c" />
          <use href="#stain" transform="translate(1240,250) scale(0.8)" fill="#a30b1c" />
        </g>

        <!-- 中等飞溅：粗糙边缘 -->
        <g filter="url(#drop)" fill="#9c0c1e">
          <circle cx="150" cy="160" r="9" opacity="0.5" />
          <circle cx="1790" cy="208" r="8" opacity="0.5" />
          <circle cx="1822" cy="816" r="7" opacity="0.5" />
          <circle cx="168" cy="948" r="8" opacity="0.5" />
          <circle cx="1628" cy="498" r="9" opacity="0.5" />
          <circle cx="1312" cy="648" r="8" opacity="0.5" />
          <circle cx="1710" cy="706" r="7" opacity="0.5" />
          <circle cx="1240" cy="560" r="6" opacity="0.45" />
          <circle cx="640" cy="430" r="7" opacity="0.45" />
          <circle cx="980" cy="760" r="6" opacity="0.4" />
        </g>

        <!-- 滴落血痕 -->
        <g fill="#8c0a1a" opacity="0.55">
          <path d="M1464,602 q3,40 2,82 q-3,-2 -4,0 q-1,-42 2,-82 Z" />
          <path d="M1590,522 q2,26 1,50 q-3,-1 -3,0 q-1,-26 0,-50 Z" />
          <path d="M1500,640 q2,30 1,56 q-3,-1 -3,0 q-1,-26 0,-56 Z" />
          <path d="M1700,640 q2,22 1,40 q-3,-1 -3,0 q-1,-22 0,-40 Z" />
        </g>

        <!-- 喷雾 / 卫星血点：大小不一、密度递减 -->
        <g fill="#b00d22">
          <circle cx="300" cy="500" r="4.5" opacity="0.42" />
          <circle cx="312" cy="486" r="2" opacity="0.36" />
          <circle cx="288" cy="512" r="1.6" opacity="0.3" />
          <circle cx="520" cy="645" r="3.5" opacity="0.38" />
          <circle cx="532" cy="632" r="1.6" opacity="0.3" />
          <circle cx="700" cy="300" r="2.6" opacity="0.34" />
          <circle cx="420" cy="825" r="4.5" opacity="0.4" />
          <circle cx="432" cy="838" r="1.8" opacity="0.3" />
          <circle cx="1100" cy="205" r="3.4" opacity="0.36" />
          <circle cx="1250" cy="905" r="4.4" opacity="0.4" />
          <circle cx="800" cy="955" r="2.6" opacity="0.32" />
          <circle cx="1650" cy="955" r="3.4" opacity="0.36" />
          <circle cx="600" cy="120" r="2.4" opacity="0.3" />
          <circle cx="1380" cy="120" r="3" opacity="0.34" />
          <circle cx="1760" cy="430" r="3" opacity="0.34" />
          <circle cx="250" cy="180" r="2.4" opacity="0.3" />
          <circle cx="1520" cy="500" r="2.2" opacity="0.32" />
          <circle cx="1542" cy="620" r="2.4" opacity="0.32" />
          <circle cx="1440" cy="700" r="2" opacity="0.3" />
          <circle cx="1640" cy="660" r="1.8" opacity="0.28" />
          <circle cx="360" cy="640" r="1.6" opacity="0.28" />
          <circle cx="720" cy="520" r="1.8" opacity="0.28" />
        </g>
      </svg>

      <div class="handprint">
        <svg viewBox="0 0 220 260">
          <defs>
            <radialGradient id="palmGrad" cx="44%" cy="40%" r="66%">
              <stop offset="0%" stop-color="#e21d30" stop-opacity="0.9" />
              <stop offset="55%" stop-color="#a80c1e" stop-opacity="0.78" />
              <stop offset="100%" stop-color="#5e000e" stop-opacity="0.28" />
            </radialGradient>
            <filter id="hpRough" x="-25%" y="-25%" width="150%" height="150%">
              <feTurbulence type="fractalNoise" baseFrequency="0.02 0.03" numOctaves="3" seed="7" result="n" />
              <feDisplacementMap in="SourceGraphic" in2="n" scale="11" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="hpSoft" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="0.8" />
            </filter>
          </defs>

          <!-- 主手形：粗糙有机边缘 -->
          <g filter="url(#hpRough)">
            <g fill="url(#palmGrad)">
              <ellipse cx="108" cy="176" rx="63" ry="59" />
              <rect x="62" y="50" width="23" height="98" rx="11.5" />
              <rect x="89" y="32" width="23" height="114" rx="11.5" />
              <rect x="116" y="34" width="23" height="112" rx="11.5" />
              <rect x="143" y="52" width="23" height="94" rx="11.5" />
              <rect x="32" y="108" width="23" height="90" rx="11.5" transform="rotate(-38 43 153)" />
            </g>
          </g>

          <!-- 指纹脊线 -->
          <g stroke="#4e000c" stroke-width="1.1" fill="none" opacity="0.3" filter="url(#hpSoft)">
            <path d="M73,64 q11,42 0,86" />
            <path d="M84,54 q5,4 11,0" />
            <path d="M100,46 q11,48 0,100" />
            <path d="M126,48 q11,46 0,96" />
            <path d="M152,66 q11,40 0,80" />
            <path d="M70,158 q40,20 76,4" />
            <path d="M66,138 q44,30 86,6" />
            <path d="M84,118 q24,16 50,2" />
          </g>

          <!-- 血/汗光泽 -->
          <ellipse cx="92" cy="158" rx="22" ry="15" fill="#ff8a98" opacity="0.14" />
          <ellipse cx="100" cy="70" rx="8" ry="20" fill="#ff8a98" opacity="0.12" />

          <!-- 指尖滴血 -->
          <g fill="#8c0a1a" opacity="0.6">
            <ellipse cx="100" cy="158" rx="3" ry="16" />
            <ellipse cx="127" cy="158" rx="3" ry="13" />
            <ellipse cx="73" cy="158" rx="2.6" ry="11" />
          </g>
        </svg>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="main-horror.js" defer></script>
</body>
</html>
